# capability-map.yml — consumer-local mapping from nexus-core semantic classes to opencode tool names.
# Created per nexus-core v0.2.0 migration (MIGRATIONS/v0_1_to_v0_2.md Step B).
# nexus-core defines abstract blocks_semantic_classes; this file maps them to concrete opencode tools.
# CI assertion in e2e-capability-coverage.mjs verifies full coverage.

semantic_class_map:
  # no_file_edit capability
  file_creation:
    - write
  file_modification:
    - write
  file_deletion: []
  partial_file_edit:
    - edit
    - patch
    - multiedit
  structured_document_edit:
    - notebookedit

  # no_task_create capability
  nexus_task_creation:
    - nx_task_add

  # no_task_update capability
  nexus_task_state_transition:
    - nx_task_update
  nexus_task_metadata_modification:
    - nx_task_update

  # no_shell_exec capability (opt-in; no canonical agent references it at v0.2.0)
  shell_command_exec:
    - bash
  subprocess_spawn:
    - bash
  interactive_shell_session:
    - bash
